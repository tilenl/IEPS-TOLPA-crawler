# TS-13 defaults (override via env or CLI when wired). No per-domain page cap (single-domain crawl).
# Profile overlay: set crawler.profile=dev to merge classpath application-dev.properties (name from this file only).

crawler.profile=
crawler.nCrawlers=
crawler.frontier.pollMs=
crawler.frontier.leaseSeconds=
crawler.frontier.leaseRecoveryBatchSize=
crawler.frontier.startupLeaseRecoveryBatchSize=
crawler.frontier.terminationGraceMs=
crawler.fetch.connectTimeoutMs=
crawler.fetch.readTimeoutMs=
crawler.fetch.maxHeadlessSessions=
crawler.fetch.headlessAcquireTimeoutMs=
crawler.fetch.headlessCircuitOpenThreshold=
crawler.fetch.maxRedirects=
crawler.health.heartbeatIntervalMs=
crawler.rateLimit.minDelayMs=
crawler.rateLimit.maxBackoffMs=
crawler.robots.cacheTtlHours=
crawler.robots.cacheMaxEntries=
crawler.robots.temporaryDenyMaxMinutes=
crawler.robots.temporaryDenyRetryMinutes=
crawler.buckets.cacheTtlHours=
crawler.buckets.cacheMaxEntries=
crawler.retry.jitterMs=
crawler.recoveryPath.maxAttempts=
crawler.recoveryPath.baseBackoffMs=
crawler.retry.maxAttempts.fetchTimeout=
crawler.retry.maxAttempts.fetchOverload=
crawler.retry.maxAttempts.fetchCapacity=
crawler.retry.maxAttempts.dbTransient=
crawler.budget.maxTotalPages=5000
crawler.budget.maxFrontierRows=

# When true, discovered https://github.com/topics and /topics/... URLs are not enqueued (seeds in crawler.seedUrls still allowed).
crawler.discovery.blockGithubTopicsPaths=true

# Host set for frontier expansion and crawldb.site robots persistence: GITHUB = github.com + *.github.com
crawler.crawlScope=GITHUB

# TS-02: comma-separated HTTP(S) seed URLs when crawldb.page is empty (override via CRAWLER_SEEDURLS).
crawler.seedUrls=https://github.com/topics/image-segmentation,https://github.com/topics/semantic-segmentation,https://github.com/topics/medical-image-segmentation,https://github.com/facebookresearch/segment-anything,https://github.com/open-mmlab/mmsegmentation,https://github.com/jfzhang95/pytorch-deeplab-xception,https://github.com/milesial/Pytorch-UNet,https://github.com/TexasInstruments/edgeai-modelzoo,https://github.com/onnx/models,https://github.com/topics/medical-image-processing,https://github.com/topics/unet,https://github.com/topics/unet-pytorch,https://github.com/topics/dpt,https://github.com/topics/imagenet,https://github.com/topics/image-processing,https://github.com/topics/lane-detection,https://github.com/topics/video-segmentation,https://github.com/topics/computer-vision,https://github.com/topics/segmentation-models,https://github.com/topics/unet-image-segmentation,https://github.com/topics/satellite-imagery,https://github.com/topics/panoptic-segmentation,https://github.com/topics/fpn,https://www.github.com/topics/food-classification

crawler.scoring.keywordConfig=keywords.json
crawler.scoring.primaryWeight=
crawler.scoring.secondaryWeight=
# use 128 when running with /topics pages allowed (and maxTotalPages set to 30), to converge to better results
crawler.scoring.maxOccurrencesPerKeyword=5
crawler.scoring.seedRelevanceScore=
crawler.db.url=jdbc:postgresql://localhost:5432/crawldb
crawler.db.user=user
crawler.db.password=SecretPassword
crawler.db.poolSize=
crawler.db.expectedSchemaVersion=7
